name: Frontend CI

on:
  push:
    branches: [ master ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'frontend/**'

jobs:
  build:
    name: Build & Lint (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (production)
        working-directory: frontend
        run: npm run build
        env:
          # Point to a placeholder during CI build; Render sets the real value
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://football-backend.onrender.com' }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: football-frontend-dist
          path: frontend/dist/
          retention-days: 7
