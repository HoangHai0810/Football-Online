services:
  - type: web
    name: football-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: football-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: football-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: football-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: football-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: football-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  - type: web
    name: football-chatbot
    runtime: docker
    dockerContext: ./chatbot
    dockerfilePath: ./chatbot/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 8000
      - key: FOOTBALL_BACKEND_URL
        value: https://football-backend-bpn2.onrender.com
      - key: GOOGLE_API_KEY
        sync: false
      - key: PYTHONPATH
        value: src

  - type: web
    name: football-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    envVars:
      - key: VITE_API_URL
        value: https://football-backend-bpn2.onrender.com
      - key: VITE_CHATBOT_URL
        value: https://football-chatbot-faav.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: football-db
    plan: free
    region: singapore
