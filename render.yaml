services:
  - type: web
    name: football-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: football-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: football-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: football-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  - type: web
    name: football-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    envVars:
      - key: VITE_API_URL
        value: https://football-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: football-db
    plan: free
    region: singapore
