# ===========================
# DEV profile — H2 in-memory
# ===========================
spring.datasource.url=jdbc:h2:mem:footballdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# App Config
app.initial-players=50000
app.initial-coins=1000

# PayOS Config
payos.client-id=944947a9-e864-4709-8b0b-477f320f9150
payos.api-key=32482a30-130a-44ee-b183-7ab1075afa19
payos.checksum-key=246775c2578d4ce100557bae661d020d4d162124b835e9664be1ca3cecd45dfb

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT secret for dev (override in prod)
jwt.secret=dev-local-secret-key-change-in-production-minimum-256-bits-please
jwt.expiration=86400000

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
