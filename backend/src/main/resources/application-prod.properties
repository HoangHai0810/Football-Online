# ===========================
# PROD profile — PostgreSQL
# ===========================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Disable H2 console in production
spring.h2.console.enabled=false

# Server port (Render sets PORT env var)
server.port=${PORT:8080}
server.forward-headers-strategy=native

# JWT — MUST be set as Render environment variables
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend URL for OAuth2 Redirect
app.frontend.url=https://football-frontend-9asm.onrender.com

# Logging
logging.level.root=WARN
logging.level.com.example.football=INFO

# Optimize startup for Render
spring.main.lazy-initialization=true

