# ===========================
# PROD profile — PostgreSQL
# ===========================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Disable H2 console in production
spring.h2.console.enabled=false

# Server port (Render sets PORT env var)
server.port=${PORT:8080}
server.forward-headers-strategy=native

# JWT — MUST be set as Render environment variables
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend URL for OAuth2 Redirect
app.frontend.url=https://football-frontend-9asm.onrender.com

# Logging
logging.level.root=WARN
logging.level.com.example.football=INFO

app.initial-players=50000
app.initial-coins=1000

# PayOS Config (Render ENV)
payos.client-id=${PAYOS_CLIENT_ID:944947a9-e864-4709-8b0b-477f320f9150}
payos.api-key=${PAYOS_API_KEY:32482a30-130a-44ee-b183-7ab1075afa19}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:246775c2578d4ce100557bae661d020d4d162124b835e9664be1ca3cecd45dfb}

# Optimize startup for Render
spring.main.lazy-initialization=true
